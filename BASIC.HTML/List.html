<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List in HTML</title>
</head>
<body>
    <ul>
        <li>Bread</li>
        <li>jam</li>
        <li>Frooti</li>

        <li>Frooti</li>
        <li>Samosa</li>
    </ol>
    
    <ol type="A" >

        <li>jam</li>
        <li>Frooti</li>
        <li>Samosa</li>
    </ol>
    
    
</body>
</html>
